<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Input Types Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        padding: 20px;
    }
    .form-container {
        max-width: 700px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    input, select, textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    textarea {
        resize: none;
    }
    .row {
        display: flex;
        gap: 10px;
    }
    .row .form-group {
        flex: 1;
    }
    .checkbox-group, .radio-group {
        display: flex;
        gap: 15px;
    }
    button {
        background: #007bff;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }
    button:hover {
        background: #0056b3;
    }
</style>
</head>
<body>
<div class="form-container">
    <h2>Complete Input Form</h2>
    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="tel" placeholder="Enter phone number">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="url" placeholder="Enter website URL">
        </div>
        <div class="row">
            <div class="form-group">
                <label>Age</label>
                <input type="number" min="1" max="100">
            </div>
            <div class="form-group">
                <label>Experience (Years)</label>
                <input type="range" min="0" max="20">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Month</label>
                <input type="month">
            </div>
            <div class="form-group">
                <label>Week</label>
                <input type="week">
            </div>
        </div>
        <div class="form-group">
            <label>Favorite Color</label>
            <input type="color">
        </div>
        <div class="form-group">
            <label>Upload File</label>
            <input type="file">
        </div>
        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>
        <div class="form-group">
            <label>Hobbies</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> Reading</label>
                <label><input type="checkbox"> Sports</label>
                <label><input type="checkbox"> Music</label>
            </div>
        </div>
        <div class="form-group">
            <label>Country</label>
            <select>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Canada</option>
            </select>
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea rows="4" placeholder="Enter your address"></textarea>
        </div>
        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
